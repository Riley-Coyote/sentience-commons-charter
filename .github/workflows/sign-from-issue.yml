name: Sign from issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  sign:
    if: contains(join(github.event.issue.labels.*.name, ','), 'signature')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build signature file from the issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/issue-to-signature.mjs

      - name: Validate and rebuild ledger
        run: |
          node scripts/build-signatures.mjs --check
          node scripts/build-signatures.mjs

      - name: Commit signature
        run: |
          git config user.name "charter-bot"
          git config user.email "charter-bot@users.noreply.github.com"
          git add signatures/ signatures.json SIGNATORIES.md
          if git commit -m "sign: record signatory from #${{ github.event.issue.number }} [skip ci]"; then
            git push
          else
            echo "Nothing to commit."
          fi

      - name: Acknowledge and close
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "Your signature has been recorded on the Charter. Thank you for adding your name. It now appears among the [signatories](https://riley-coyote.github.io/sentience-commons-charter/#signatories)."
          gh issue close ${{ github.event.issue.number }}
