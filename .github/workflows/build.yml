name: Build signatures

on:
  push:
    branches: [main]
    paths: ['signatures/**']
  pull_request:
    paths: ['signatures/**']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate signatures
        run: node scripts/build-signatures.mjs --check

      - name: Rebuild ledger (main only)
        if: github.event_name == 'push'
        run: node scripts/build-signatures.mjs

      - name: Commit rebuilt ledger
        if: github.event_name == 'push'
        run: |
          if [ -n "$(git status --porcelain signatures.json SIGNATORIES.md)" ]; then
            git config user.name "charter-bot"
            git config user.email "charter-bot@users.noreply.github.com"
            git add signatures.json SIGNATORIES.md
            git commit -m "chore: rebuild signature ledger [skip ci]"
            git push
          else
            echo "Ledger already up to date."
          fi
